<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary meta -->
    <title>Dispatch — Export Planner for Designers</title>
    <meta name="description" content="Generate the exact export checklist for any design project. Brand, app icons, social packs, packaging, video content, and more. No signup." />
    <meta name="theme-color" content="#0D0D0D" />
    <meta name="color-scheme" content="dark" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Dispatch" />

    <!-- Favicon -->
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon.svg" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Dispatch — Export Planner for Designers" />
    <meta property="og:description" content="Generate the exact export checklist for any design project. Brand, app icons, social packs, packaging, video content, and more. No signup." />
    <meta property="og:image" content="/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Dispatch by CurioLabs" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Dispatch — Export Planner for Designers" />
    <meta name="twitter:description" content="Know exactly what to hand off, before you hand off. 11 project types, no signup." />
    <meta name="twitter:image" content="/og-image.svg" />

    <!-- Font -->
    <style>
      @font-face {
        font-family: 'AuxMono';
        src: url('/fonts/AuxMono-Regular.woff2') format('woff2'),
             url('/fonts/AuxMono-Regular.woff')  format('woff');
        font-weight: 400;
        font-display: swap;
      }
    </style>

    <!-- Base styles -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root {
        height: 100%;
        background: #0D0D0D;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #252525; border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: #333; }
      ::selection { background: #FF6B3530; color: #FF6B35; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
