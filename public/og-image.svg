  <!-- Corner marks -->
  <g stroke="#FF6B35" stroke-width="2" fill="none" opacity="0.35">
    <path d="M 44,88 L 44,44 L 88,44"/>
    <path d="M 1112,44 L 1156,44 L 1156,88"/>
    <path d="M 44,542 L 44,586 L 88,586"/>
    <path d="M 1112,586 L 1156,586 L 1156,542"/>
  </g>

  <!-- Large D mark on the right -->
  <path fill="#FF6B35" fill-rule="evenodd" opacity="0.07" d="
    M 760,80 L 760,550 L 940,550
    C 1100,550 1160,460 1160,315
    C 1160,170 1100,80 940,80 Z
    M 830,148 L 930,148
    C 1060,148 1090,220 1090,315
    C 1090,410 1060,482 930,482
