    <text x="82"  y="431">Brand Identity</text>

    <rect x="194" y="415" width="110" height="22" rx="2" fill="#161616"/>
    <text x="204" y="431">App Icon Set</text>

    <rect x="314" y="415" width="128" height="22" rx="2" fill="#161616"/>
